<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>博客文章月度统计</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #1b1b1d;
        --muted: #6b7280;
        --line: #ececef;
        --card: #fafafa;
        --accent: #3b82f6;
        --accent-soft: #dbeafe;
        --sol: #93c5fd;
        --sol-hi: #3b82f6;
        --oth: #fcd34d;
        --oth-hi: #f59e0b;
        --radius: 14px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1b1b1d;
          --fg: #f5f5f7;
          --muted: #9aa0a6;
          --line: #2c2c30;
          --card: #232327;
          --accent: #60a5fa;
          --accent-soft: #1e3a5f;
          --sol: #3b5a80;
          --sol-hi: #60a5fa;
          --oth: #6f5520;
          --oth-hi: #fbbf24;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
          'Hiragino Sans GB', 'Microsoft YaHei', Roboto, Helvetica, Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
      }
      .wrap {
        max-width: 1040px;
        margin: 0 auto;
        padding: clamp(24px, 5vw, 56px) clamp(16px, 4vw, 40px);
      }
      header h1 {
        font-size: clamp(22px, 3.5vw, 30px);
        font-weight: 650;
        letter-spacing: -0.01em;
        margin: 0 0 6px;
      }
      header p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin: 28px 0 32px;
      }
      @media (max-width: 560px) {
        .stats {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .stat {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 16px 18px;
      }
      .stat .v {
        font-size: clamp(20px, 3vw, 26px);
        font-weight: 650;
        letter-spacing: -0.01em;
        font-variant-numeric: tabular-nums;
      }
      .stat .k {
        font-size: 12.5px;
        color: var(--muted);
        margin-top: 2px;
      }
      .chart {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 24px clamp(16px, 3vw, 28px) 18px;
      }
      .legend {
        display: flex;
        gap: 18px;
        margin-bottom: 18px;
        font-size: 13px;
        color: var(--muted);
      }
      .legend i {
        display: inline-block;
        width: 11px;
        height: 11px;
        border-radius: 3px;
        margin-right: 6px;
        vertical-align: -1px;
      }
      .legend .sol {
        background: var(--sol-hi);
      }
      .legend .oth {
        background: var(--oth-hi);
      }
      .plot {
        position: relative;
        height: 320px;
        display: flex;
        align-items: flex-end;
        gap: 2px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 1px;
      }
      .grid-line {
        position: absolute;
        left: 0;
        right: 0;
        border-top: 1px dashed var(--line);
        font-size: 11px;
        color: var(--muted);
      }
      .grid-line span {
        position: absolute;
        top: -8px;
        left: 0;
        background: var(--card);
        padding-right: 6px;
        font-variant-numeric: tabular-nums;
      }
      .bar {
        flex: 1 1 0;
        min-width: 0;
        display: flex;
        flex-direction: column;
        border-radius: 3px 3px 0 0;
        overflow: hidden;
        cursor: default;
      }
      .seg {
        width: 100%;
        transition: background 0.15s ease;
      }
      .seg.oth {
        background: var(--oth);
      }
      .seg.sol {
        background: var(--sol);
      }
      .bar:hover .seg.oth {
        background: var(--oth-hi);
      }
      .bar:hover .seg.sol {
        background: var(--sol-hi);
      }
      .axis {
        position: relative;
        height: 22px;
        margin-top: 6px;
      }
      .ylab {
        position: absolute;
        transform: translateX(-50%);
        font-size: 12px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .ytick {
        position: absolute;
        top: 0;
        width: 1px;
        height: 4px;
        background: var(--line);
        transform: translateX(-50%);
      }
      .tip {
        position: fixed;
        pointer-events: none;
        background: var(--fg);
        color: var(--bg);
        font-size: 12.5px;
        padding: 6px 9px;
        border-radius: 8px;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.12s ease;
        z-index: 10;
        font-variant-numeric: tabular-nums;
      }
      footer {
        margin-top: 20px;
        font-size: 12.5px;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>博客文章月度统计</h1>
        <p>历年每月发布的文章数量 · 2021.09 – 2026.05</p>
      </header>

      <div class="stats" id="stats"></div>

      <div class="chart">
        <div class="legend">
          <span><i class="sol"></i>题解</span>
          <span><i class="oth"></i>非题解</span>
        </div>
        <div class="plot" id="plot"></div>
        <div class="axis" id="axis"></div>
      </div>

      <footer>数据来源：blog/ 目录下文章 frontmatter 的 date 字段</footer>
    </div>

    <div class="tip" id="tip"></div>

    <script>
      // 各月文章数（缺失月份补 0）：sol = 题解，oth = 非题解
      const solRaw = {
        '2021-09': 1, '2021-11': 3, '2021-12': 1,
        '2022-01': 2, '2022-02': 4, '2022-03': 2, '2022-04': 1,
        '2023-01': 3, '2023-02': 4, '2023-05': 14, '2023-06': 6,
        '2023-07': 1, '2023-09': 1, '2023-10': 3, '2023-11': 6,
        '2024-01': 1, '2024-04': 6, '2024-05': 2, '2024-07': 2,
        '2024-10': 4, '2024-11': 9, '2024-12': 11,
        '2025-01': 2, '2025-06': 2, '2025-07': 2, '2025-08': 5,
        '2025-09': 7, '2025-10': 4, '2025-11': 5,
        '2026-01': 2, '2026-02': 1, '2026-03': 4, '2026-04': 2, '2026-05': 3,
      };
      const othRaw = {
        '2022-08': 1, '2022-11': 1,
        '2023-03': 1, '2023-05': 1, '2023-06': 1, '2023-09': 1, '2023-11': 1,
        '2024-02': 1, '2024-08': 1, '2024-09': 1, '2024-10': 1,
        '2024-11': 1, '2024-12': 1,
        '2025-01': 1, '2025-02': 1, '2025-06': 3, '2025-07': 4, '2025-08': 2,
        '2025-09': 1, '2025-10': 5, '2025-11': 1, '2025-12': 1,
        '2026-02': 1, '2026-04': 1, '2026-05': 1,
      };

      // 构造连续月度序列
      const start = [2021, 9];
      const end = [2026, 5];
      const months = [];
      let [y, m] = start;
      while (y < end[0] || (y === end[0] && m <= end[1])) {
        const key = `${y}-${String(m).padStart(2, '0')}`;
        const sol = solRaw[key] || 0;
        const oth = othRaw[key] || 0;
        months.push({ key, y, m, sol, oth, count: sol + oth });
        m++;
        if (m > 12) { m = 1; y++; }
      }

      const counts = months.map((d) => d.count);
      const total = counts.reduce((a, b) => a + b, 0);
      const solTotal = months.reduce((a, d) => a + d.sol, 0);
      const othTotal = total - solTotal;
      const max = Math.max(...counts);
      const peak = months.find((d) => d.count === max);

      // 概览卡片
      const statData = [
        { v: total, k: '文章总数' },
        { v: solTotal, k: `题解 · 占 ${Math.round((solTotal / total) * 100)}%` },
        { v: othTotal, k: `非题解 · 占 ${Math.round((othTotal / total) * 100)}%` },
        { v: `${max} 篇`, k: `单月峰值 · ${peak.y}.${String(peak.m).padStart(2, '0')}` },
      ];
      document.getElementById('stats').innerHTML = statData
        .map((s) => `<div class="stat"><div class="v">${s.v}</div><div class="k">${s.k}</div></div>`)
        .join('');

      // Y 轴网格线
      const plot = document.getElementById('plot');
      const yMax = Math.ceil(max / 5) * 5; // 取 5 的倍数
      const steps = yMax / 5;
      for (let i = 1; i <= steps; i++) {
        const val = i * 5;
        const line = document.createElement('div');
        line.className = 'grid-line';
        line.style.bottom = `${(val / yMax) * 100}%`;
        line.innerHTML = `<span>${val}</span>`;
        plot.appendChild(line);
      }

      // 柱子（堆叠：题解在下，非题解在上）
      const tip = document.getElementById('tip');
      months.forEach((d) => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = d.count === 0 ? '0' : `${(d.count / yMax) * 100}%`;
        const segOth = document.createElement('div');
        segOth.className = 'seg oth';
        segOth.style.flexGrow = d.oth;
        const segSol = document.createElement('div');
        segSol.className = 'seg sol';
        segSol.style.flexGrow = d.sol;
        bar.append(segOth, segSol);
        const mm = String(d.m).padStart(2, '0');
        bar.addEventListener('mousemove', (e) => {
          tip.style.opacity = '1';
          tip.textContent = `${d.y}.${mm} · 共 ${d.count} 篇（题解 ${d.sol} · 非题解 ${d.oth}）`;
          tip.style.left = e.clientX + 12 + 'px';
          tip.style.top = e.clientY - 8 + 'px';
        });
        bar.addEventListener('mouseleave', () => (tip.style.opacity = '0'));
        plot.appendChild(bar);
      });

      // X 轴：每年 1 月对齐标签
      const axis = document.getElementById('axis');
      const n = months.length;
      months.forEach((d, i) => {
        if (d.m === 1 || i === 0) {
          const pct = ((i + 0.5) / n) * 100;
          const lab = document.createElement('div');
          lab.className = 'ylab';
          lab.style.left = `${pct}%`;
          lab.textContent = d.y;
          axis.appendChild(lab);
          const tick = document.createElement('div');
          tick.className = 'ytick';
          tick.style.left = `${pct}%`;
          axis.appendChild(tick);
        }
      });
    </script>
  </body>
</html>
